<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Aniversário, Yaya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffeef8 0%, #f8e8ff 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 700px;
      background: white;
      border-radius: 30px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(233, 30, 99, 0.15);
      text-align: center;
      position: relative;
      animation: fadeIn 1.5s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .hearts {
      font-size: 50px;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .message {
      font-size: 22px;
      line-height: 1.9;
      color: #444;
      margin-bottom: 40px;
    }
    
    .highlight {
      color: #e91e63;
      font-weight: bold;
    }
    
    .signature {
      font-size: 24px;
      color: #e91e63;
      font-style: italic;
      margin-top: 30px;
    }
    
    .floating-heart {
      position: absolute;
      color: rgba(233, 30, 99, 0.2);
      font-size: 30px;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    
    @media (max-width: 600px) {
      .container { padding: 40px 25px; }
      .message { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="floating-heart" style="top: 10%; left: 10%;">🩷</div>
  <div class="floating-heart" style="top: 20%; right: 15%; animation-delay: 1s;">🩷</div>
  <div class="floating-heart" style="bottom: 15%; left: 20%; animation-delay: 2s;">🩷</div>
  
  <div class="container">
    <div class="hearts">🩷</div>
